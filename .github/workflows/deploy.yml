name: Deploy to GitHub Pages

on:
  push:
    branches: [main] # お使いのメインブランチ名が master の場合は master に変更

permissions:
  contents: read
  pages: write # 💡GitHub Pagesへの書き込みを許可
  id-token: write # 💡認証トークンの作成を許可

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/configure-pages@v5
        with:
          # 💡Jekyllの自動ビルドを完全に無効化（静的ファイルとして扱う）する指定
          enablement: true
      - name: Install Node.js dependencies
        run: npm ci
        working-directory: ./Site
      - name: Build Astro
        run: npm run build
        working-directory: ./Site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./Site/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

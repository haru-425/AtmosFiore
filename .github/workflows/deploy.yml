name: Deploy to GitHub Pages

on:
  push:
    branches: [main] # ⚠️お使いのメインブランチ名が master の場合は master に変更してください

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/configure-pages@v5
      - name: Install Node.js dependencies
        run: npm ci
        working-directory: ./Site
      - name: Build Astro
        run: npm run build
        working-directory: ./Site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./Site/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
